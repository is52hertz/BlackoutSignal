<svg xmlns="http://www.w3.org/2000/svg" width="640" height="520" viewBox="0 0 640 520"
     font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <filter id="win" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="22" flood-color="#000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="640" height="520" fill="#ffffff" opacity="0"/>

  <g filter="url(#win)">
    <!-- window body -->
    <rect x="16" y="14" width="608" height="492" rx="14" fill="#ececee"/>
    <!-- title bar -->
    <path d="M16 28 a14 14 0 0 1 14 -14 h580 a14 14 0 0 1 14 14 v22 h-608 z" fill="#f6f6f8"/>
    <circle cx="40" cy="33" r="6" fill="#ff5f57"/>
    <circle cx="60" cy="33" r="6" fill="#febc2e"/>
    <circle cx="80" cy="33" r="6" fill="#28c840"/>
    <text x="320" y="38" text-anchor="middle" fill="#3a3a3c" font-size="13" font-weight="600">BlackoutSignal 设置</text>
  </g>

  <!-- Section: 黑屏保信号 -->
  <text x="44" y="84" fill="#6e6e73" font-size="12">黑屏保信号</text>
  <rect x="32" y="92" width="576" height="132" rx="10" fill="#ffffff"/>
  <text x="52" y="124" fill="#1d1d1f" font-size="14">当前状态</text>
  <text x="588" y="124" text-anchor="end" fill="#6e6e73" font-size="14">正常</text>
  <line x1="52" y1="136" x2="588" y2="136" stroke="#ededf0" stroke-width="1"/>
  <text x="52" y="168" fill="#1d1d1f" font-size="14">全局快捷键</text>
  <text x="588" y="168" text-anchor="end" fill="#6e6e73" font-size="14">⌥ ⌘ B</text>
  <line x1="52" y1="180" x2="588" y2="180" stroke="#ededf0" stroke-width="1"/>
  <text x="52" y="212" fill="#1d1d1f" font-size="14">退出方式</text>
  <text x="588" y="212" text-anchor="end" fill="#6e6e73" font-size="14">再按快捷键 ・ Esc ・ 菜单</text>

  <!-- Section: 通用 -->
  <text x="44" y="262" fill="#6e6e73" font-size="12">通用</text>
  <rect x="32" y="270" width="576" height="52" rx="10" fill="#ffffff"/>
  <text x="52" y="301" fill="#1d1d1f" font-size="14">开机时自动启动</text>
  <rect x="544" y="285" width="44" height="24" rx="12" fill="#34c759"/>
  <circle cx="576" cy="297" r="9.5" fill="#ffffff"/>

  <!-- Section: 工作方式 -->
  <text x="44" y="360" fill="#6e6e73" font-size="12">工作方式</text>
  <rect x="32" y="368" width="576" height="86" rx="10" fill="#ffffff"/>
  <text x="52" y="394" fill="#6e6e73" font-size="12.5">进入黑屏模式后，会通过 DDC/CI 将支持的外接显示器亮度降到 0，并在所有屏幕</text>
  <text x="52" y="414" fill="#6e6e73" font-size="12.5">叠加纯黑覆盖；同时保持视频信号输出、阻止系统与显示器进入睡眠。退出后会</text>
  <text x="52" y="434" fill="#6e6e73" font-size="12.5">恢复进入前的亮度并释放电源占用。</text>

  <!-- Section: version -->
  <rect x="32" y="466" width="576" height="40" rx="10" fill="#ffffff"/>
  <text x="52" y="491" fill="#1d1d1f" font-size="14">版本</text>
  <text x="588" y="491" text-anchor="end" fill="#6e6e73" font-size="14">1.1 (2)</text>
</svg>
